<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Emma AI · Beautiful Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{--emma-primary:#8b5cf6;--emma-secondary:#ec4899;--emma-gradient:linear-gradient(135deg,#8b5cf6 0%,#ec4899 100%);--emma-soft:#f5f3ff;--bg-primary:#f8fafc;--bg-secondary:#ffffff;--border-light:#e2e8f0;--text-primary:#0f172a;--text-secondary:#334155;--shadow-emma:0 10px 25px -5px rgba(139,92,246,0.4)}
        body{font-family:'Inter',sans-serif;background:var(--bg-primary);height:100vh;overflow:hidden}
        .app{display:flex;flex-direction:column;height:100%;max-width:900px;margin:0 auto;background:white}
        .header{padding:12px 16px;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center}
        .logo{display:flex;align-items:center;gap:8px;cursor:pointer}
        .logo-icon{width:44px;height:44px;background:var(--emma-gradient);border-radius:14px;display:flex;align-items:center;justify-content:center;color:white;font-size:1.4rem;font-weight:600;box-shadow:var(--shadow-emma)}
        .logo-text{font-weight:700;font-size:1.4rem;background:var(--emma-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .status{display:flex;align-items:center;gap:8px;background:#f1f5f9;padding:6px 14px;border-radius:999px;font-size:0.85rem}
        .status-dot{width:10px;height:10px;border-radius:50%;background:#22c55e;position:relative}
        .status-dot::after{content:'';position:absolute;top:-3px;left:-3px;right:-3px;bottom:-3px;border-radius:50%;background:#22c55e;opacity:0.3;animation:ping 1.5s infinite}
        @keyframes ping{75%,100%{transform:scale(2);opacity:0}}
        .messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
        .message{display:flex;max-width:85%;animation:slide .3s}
        .message.user{align-self:flex-end}
        .message.assistant{align-self:flex-start}
        .message-content{padding:14px 18px;border-radius:24px;font-size:15px;line-height:1.6}
        .user .message-content{background:var(--emma-gradient);color:white;border-bottom-right-radius:6px;box-shadow:var(--shadow-emma)}
        .assistant .message-content{background:white;border:1px solid var(--border-light);border-bottom-left-radius:6px}
        .typing{display:flex;gap:5px;padding:14px 18px}
        .typing span{width:10px;height:10px;background:#94a3b8;border-radius:50%;animation:wave 1.5s infinite}
        .typing span:nth-child(2){animation-delay:.2s}
        .typing span:nth-child(3){animation-delay:.4s}
        @keyframes wave{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-10px);background:var(--emma-primary)}}
        .input-area{padding:12px 16px;border-top:1px solid var(--border-light)}
        .input-wrapper{display:flex;align-items:center;gap:10px;background:#f8fafc;border:2px solid transparent;border-radius:40px;padding:6px 6px 6px 20px}
        .input-wrapper:focus-within{border-color:var(--emma-primary)}
        .input-wrapper input{flex:1;border:none;background:transparent;padding:14px 0;font-size:16px;outline:none}
        .send-btn{width:54px;height:54px;border:none;border-radius:50%;background:var(--emma-gradient);color:white;cursor:pointer;box-shadow:var(--shadow-emma)}
        .footer{text-align:center;padding:12px;font-size:12px;color:#94a3b8;border-top:1px solid var(--border-light)}
        @media(max-width:480px){.message{max-width:90%}.message-content{font-size:16px}}
    </style>
</head>
<body>
<div class="app">
    <header class="header">
        <div class="logo" id="emmaLogo">
            <div class="logo-icon">E</div>
            <span class="logo-text">Emma AI</span>
        </div>
        <div class="status"><span class="status-dot" id="statusDot"></span><span id="statusText">Online</span></div>
    </header>

    <div class="messages" id="messages">
        <div class="message assistant"><div class="message-content">✨ Hi! I'm Emma. Ask me anything!</div></div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input id="messageInput" placeholder="Message Emma..." autocomplete="off">
            <button class="send-btn" id="sendButton" disabled>➤</button>
        </div>
    </div>
    <div class="footer"><i class="fas fa-lock"></i> Emma AI · Secure & Fast</div>
</div>

<!-- Hidden Admin Panel -->
<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:10000;display:none;align-items:center;justify-content:center" id="adminPanel">
    <div style="background:white;padding:40px;border-radius:32px;max-width:400px">
        <h2 style="color:#8b5cf6;margin-bottom:20px">⚡ Emma Admin</h2>
        <input type="password" id="adminPassword" placeholder="Password" value="emma123" style="width:100%;padding:15px;margin-bottom:15px;border:2px solid #e2e8f0;border-radius:12px">
        <button onclick="adminLogin()" style="width:100%;padding:15px;background:linear-gradient(135deg,#8b5cf6,#ec4899);border:none;border-radius:12px;color:white;font-weight:bold;margin-bottom:10px;cursor:pointer">Access</button>
        <button onclick="closeAdminPanel()" style="width:100%;padding:15px;background:transparent;border:2px solid #e2e8f0;border-radius:12px;cursor:pointer">Close</button>
    </div>
</div>

<script>
// ===== EMMA AI - READY FOR DEPLOYMENT =====
const API_KEY = 'AIzaSyBhicDd9jnjDG5J1_bxPGH7L6pCZtE1Bqw';
const chat = document.getElementById('messages');
const input = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendButton');
let typing = false, history = [];

// Test connection
fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`, {
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:'ping'}]}]})
}).then(r=>{sendBtn.disabled=false});

// Send message
sendBtn.onclick = async () => {
    let text = input.value.trim();
    if(!text||typing||sendBtn.disabled) return;
    
    // Show user message
    addMsg(text, true);
    input.value = '';
    history.push({role:'user',content:text});
    
    // Show typing
    let typingDiv = document.createElement('div');
    typingDiv.className = 'message assistant'; typingDiv.id = 'typing';
    typingDiv.innerHTML = '<div class="message-content typing"><span></span><span></span><span></span></div>';
    chat.appendChild(typingDiv); chat.scrollTop = chat.scrollHeight; typing = true;
    
    try {
        let res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                contents: [...history.map(m=>({role:m.role=='user'?'user':'model', parts:[{text:m.content}]})),
                           {role:'user', parts:[{text}]}]
            })
        });
        let data = await res.json();
        let reply = data.candidates[0].content.parts[0].text;
        document.getElementById('typing')?.remove(); typing = false;
        addMsg(reply, false);
        history.push({role:'assistant', content:reply});
    } catch(e) {
        document.getElementById('typing')?.remove(); typing = false;
        addMsg('✨ Error occurred', false);
    }
};

input.onkeypress = (e) => e.key === 'Enter' && sendBtn.click();

function addMsg(text, isUser) {
    let msg = document.createElement('div');
    msg.className = `message ${isUser ? 'user' : 'assistant'}`;
    msg.innerHTML = `<div class="message-content">${text}</div>`;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

// Hidden admin (triple tap)
let taps = 0;
document.getElementById('emmaLogo').onclick = () => {
    taps++; setTimeout(() => taps = 0, 500);
    if(taps >= 3) document.getElementById('adminPanel').style.display = 'flex';
};

window.adminLogin = () => {
    if(document.getElementById('adminPassword').value === 'emma123') {
        alert('✨ Admin Access Granted');
        document.getElementById('adminPanel').style.display = 'none';
    }
};

window.closeAdminPanel = () => {
    document.getElementById('adminPanel').style.display = 'none';
};
</script>
</body>
</html>
